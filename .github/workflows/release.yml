name: Production Release

on:
  push:
    tags:
      - 'v*' # Automatically triggers when you push a new tag (e.g., v1.0.0)
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version Tag (e.g., v1.0.1)'
        required: true
        default: 'v1.0.1'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    steps:
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Assemble APK
        run: ./gradlew assembleDebug

      - name: Rename APK for Release
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk Discord-App-RPC.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_tag || github.ref_name }}
          name: Release ${{ github.event.inputs.version_tag || github.ref_name }}
          files: Discord-App-RPC.apk
          generate_release_notes: true
